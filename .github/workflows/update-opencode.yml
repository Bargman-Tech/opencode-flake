name: Update OpenCode with nix-update

# Semi-regular clockwork: daily update via nix-update on prebuilt release assets.
# Pattern adapted from noblepayne/opencode-flake (binary packaging + validate-before-push).
#
# GitHub scheduled workflows:
# 1. Only run on the default branch
# 2. Disable after 60 days of repository inactivity
# 3. All times are UTC

on:
  schedule:
    # Semi-regular: daily at 06:15 UTC
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific version to update to (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version for comparison
        id: current-version
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' package.nix | head -1)
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Update OpenCode with nix-update
        id: update-check
        run: |
          set -euo pipefail
          echo "Running nix-update for OpenCode..."

          EXTRA_ARGS=()
          if [ -n "${{ github.event.inputs.version }}" ]; then
            EXTRA_ARGS+=(--version "${{ github.event.inputs.version }}")
          fi

          # Provide nix-update via nix shell (no profile install)
          if nix shell nixpkgs#nix-update -c nix-update --flake opencode "${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}"; then
            if git diff --quiet; then
              echo "No changes detected - already at latest version"
              echo "has-changes=false" >> "$GITHUB_OUTPUT"
            else
              NEW_VERSION=$(grep -oP 'version = "\K[^"]+' package.nix | head -1)
              echo "Successfully updated package.nix to version: $NEW_VERSION"
              echo "has-changes=true" >> "$GITHUB_OUTPUT"
              echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "nix-update failed"
            exit 1
          fi

      - name: Build and validate
        if: steps.update-check.outputs.has-changes == 'true'
        run: |
          set -euo pipefail
          echo "Validating build for updated package..."
          nix build .#opencode -L
          ./result/bin/opencode --version
          nix flake check -L

      - name: Commit, tag, and push
        if: steps.update-check.outputs.has-changes == 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.update-check.outputs.new-version }}"

          git add package.nix
          git commit -m "$(cat <<EOF
          Update OpenCode to version ${NEW_VERSION}

          - Updated version and platform release hashes
          - Automated update via nix-update
          EOF
          )"

          # Annotated release tag
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEW_VERSION} already exists locally; moving to new commit"
            git tag -f -a "v${NEW_VERSION}" -m "OpenCode Flake version ${NEW_VERSION}"
          else
            git tag -a "v${NEW_VERSION}" -m "OpenCode Flake version ${NEW_VERSION}"
          fi

          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${NEW_VERSION}" --force-with-lease || git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.update-check.outputs.has-changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.update-check.outputs.new-version }}
          name: OpenCode Flake ${{ steps.update-check.outputs.new-version }}
          body: |
            OpenCode Flake version ${{ steps.update-check.outputs.new-version }}

            This release packages [OpenCode](https://github.com/anomalyco/opencode) v${{ steps.update-check.outputs.new-version }} as a Nix flake (prebuilt release binaries).

            **Automated Update**: Updated with nix-update and validated via `nix build` / `nix flake check`.

            ## Installation

            ```bash
            nix run github:Bargman-Tech/opencode-flake
            nix profile install github:Bargman-Tech/opencode-flake
            ```

            ## Using in a flake

            ```nix
            {
              inputs.opencode-flake.url = "github:Bargman-Tech/opencode-flake";

              outputs = { self, nixpkgs, opencode-flake, ... }: {
                packages.x86_64-linux.opencode = opencode-flake.packages.x86_64-linux.default;
              };
            }
            ```
          draft: false
          prerelease: false

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update-check.outputs.has-changes }}" = "true" ]; then
            echo "✅ Successfully updated OpenCode to version ${{ steps.update-check.outputs.new-version }}"
            echo "🏷️  Created tag and GitHub release"
          else
            echo "ℹ️  No updates needed - already at latest version (or update step did not complete)"
          fi
