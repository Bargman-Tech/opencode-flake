name: Update OpenCode

# Semi-regular clockwork: daily stable-release update.
# Uses GitHub Releases API + multi-platform hash refresh (noblepayne-style binary packaging).

on:
  schedule:
    # Semi-regular: daily at 06:15 UTC
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific version to update to (optional, e.g. 1.18.3)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-opencode:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current-version
        run: |
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' package.nix | head -1)
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Update OpenCode
        id: update-check
        run: |
          set -euo pipefail
          chmod +x ./update.sh ./scripts/update-vendor-hash.sh

          if [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET="${{ github.event.inputs.version }}"
            TARGET="${TARGET#v}"
            CURRENT="${{ steps.current-version.outputs.current-version }}"
            if [ "$CURRENT" = "$TARGET" ]; then
              echo "Already at requested version: $TARGET"
              echo "has-changes=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Manual version requested: $TARGET"
            sed -i "s/version = \"${CURRENT}\"/version = \"${TARGET}\"/" package.nix
            ./scripts/update-vendor-hash.sh
          else
            ./update.sh
          fi

          if git diff --quiet; then
            echo "No changes detected - already at latest version"
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            NEW_VERSION=$(grep -oP 'version = "\K[^"]+' package.nix | head -1)
            echo "Updated to version: $NEW_VERSION"
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "new-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and validate
        if: steps.update-check.outputs.has-changes == 'true'
        run: |
          set -euo pipefail
          nix build .#opencode -L
          ./result/bin/opencode --version
          nix flake check -L

      - name: Commit, tag, and push
        if: steps.update-check.outputs.has-changes == 'true'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.update-check.outputs.new-version }}"

          git add package.nix
          git commit -m "$(cat <<EOF
          Update OpenCode to version ${NEW_VERSION}

          - Updated version and platform release hashes
          - Automated update via update.sh
          EOF
          )"

          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            git tag -f -a "v${NEW_VERSION}" -m "OpenCode Flake version ${NEW_VERSION}"
          else
            git tag -a "v${NEW_VERSION}" -m "OpenCode Flake version ${NEW_VERSION}"
          fi

          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${NEW_VERSION}" --force-with-lease || git push origin "v${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.update-check.outputs.has-changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.update-check.outputs.new-version }}
          name: OpenCode Flake ${{ steps.update-check.outputs.new-version }}
          body: |
            OpenCode Flake version ${{ steps.update-check.outputs.new-version }}

            Packages [OpenCode](https://github.com/anomalyco/opencode) v${{ steps.update-check.outputs.new-version }} as prebuilt Nix binaries.

            ## Install

            ```bash
            nix run github:Bargman-Tech/opencode-flake
            ```
          draft: false
          prerelease: false

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update-check.outputs.has-changes }}" = "true" ]; then
            echo "✅ Updated OpenCode to ${{ steps.update-check.outputs.new-version }}"
          else
            echo "ℹ️ Already at latest (or no change)"
          fi
